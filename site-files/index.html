<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>SOLUNA PUBLIC</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/deustch2acc/cloudmoon-custom@master/site-files/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/deustch2acc/cloudmoon-custom@master/site-files/style_v%3D31.css">
</head>
<body>
  <div id="grid-bg"></div>

  <!-- Topbar -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="brand">SOLUNA<span class="brand-xyz"> PUBLIC</span></span>
      <span class="version">v3.0.2</span>
    </div>
    <div class="topbar-right">
      <span class="top-link">GitHub</span>
      <span class="top-link">About Us</span>
      <button class="top-btn" type="button" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <!-- Header / search -->
  <div id="header">
    <div id="header-hero">
      <div id="random-message" class="random-message"></div>

      <div class="server-select-wrap">
        <div class="server-select">
          <select id="serverSelect" aria-label="Server Select">
            <option value="0">Select Server</option>
            <option value="21">South America</option>
            <option value="22">US West</option>
            <option value="23">US East</option>
            <option value="3">Asia</option>
            <option value="4">Europe</option>
          </select>
        </div>
      </div>

      <div id="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input id="search" type="search" placeholder="Search apps..." autocomplete="off" oninput="filterGrid(this.value)">
      </div>
    </div>
  </div>

  <!-- App grid -->
  <div id="home">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Launch screen -->
  <div id="launch">
    <div id="launch-inner">
      <img id="launch-icon" src="" alt="">
      <div class="spinner" id="spinner"></div>
      <p id="launch-status">Connecting...</p>
      <div class="prog-track"><div class="prog-fill" id="launch-bar" style="width:0"></div></div>
    </div>
  </div>

  <!-- Update modal -->
  <div id="update-modal" class="update-modal" style="display:flex;">
    <div class="update-card" style="position:relative;">
      <div class="update-title">A new update was released!</div>
      <div class="update-version">SOLUNA v3.0.2</div>

      <div class="update-section">
        <div class="update-label">Added</div>
        <div class="update-text">Working status</div>
      </div>

      <div class="update-section">
        <div class="update-label">Changed</div>
        <div class="update-text">Visuals</div>
      </div>

      <div class="update-section">
        <div class="update-label">Fixed</div>
        <div class="update-text">Nothing</div>
      </div>

      <button id="update-close-btn" class="update-close-btn" type="button">Sounds great!</button>
    </div>
  </div>

  <script>
    (function () {
      var modal = document.getElementById('update-modal');
      var btn   = document.getElementById('update-close-btn');
      if (modal) modal.style.display = 'flex';
      if (btn)   btn.onclick = function () { modal.style.display = 'none'; };
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/deustch2acc/cloudmoon-custom@master/site-files/app_v%3D31.js"></script>

</body></html>
